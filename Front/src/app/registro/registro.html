  <div class="hero-section position-relative" style="background-image: url('https://images.unsplash.com/photo-1511379938547-c1f69419868d');">
  <!-- HERO -->
  <div class="hero-section position-relative mb-4" >
    <div class="hero-overlay d-flex align-items-end p-4">
      <div class="text-white">
        <h1 class="fw-bold">Únete a LyricsDepot</h1>
        <p>Crea tu cuenta y comparte música</p>
      </div>
    </div>
  </div>

  <!-- FORM -->
    <div class="hero-overlay d-flex justify-content-center align-items-center">
      <div class="card shadow-lg p-4" style="width: 350px; background: rgba(255,255,255,0.95); border-radius: 15px;">
      <h4 class="fw-bold text-center mb-3">Crear cuenta</h4>

      <form (submit)="registro()">

        <input type="text" [(ngModel)]="nombre" name="nombre"
          class="form-control mb-3 input-custom"
          placeholder="Nombre" required>

        <input type="email" [(ngModel)]="correo" name="correo"
          class="form-control mb-3 input-custom"
          placeholder="Correo" required>

        <input type="password" [(ngModel)]="contrasena" name="contrasena"
          class="form-control mb-3 input-custom"
          placeholder="Contraseña" required>

        <button type="submit" class="btn btn-dark w-100 btn-register">
          Registrarse
        </button>

      </form>

    </div>
  </div>

</div>
