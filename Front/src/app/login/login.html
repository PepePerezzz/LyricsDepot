<div class="container-fluid p-0">



  <!-- HERO LOGIN -->

  <div class="hero-section position-relative"

       style="background-image: url('https://images.unsplash.com/photo-1511379938547-c1f69419868d');">



    <div class="hero-overlay d-flex justify-content-center align-items-center">



      <div class="card shadow-lg p-4" style="width: 350px; background: rgba(255,255,255,0.95); border-radius: 15px;">

       

        <h3 class="text-center fw-bold mb-3">Iniciar Sesión</h3>



        <form (submit)="login()">



          <div class="mb-3">

            <label class="form-label">Correo</label>

            <input type="email" [(ngModel)]="correo" name="correo" class="form-control" required>

          </div>



          <div class="mb-3">

            <label class="form-label">Contraseña</label>

            <input type="password" [(ngModel)]="contrasena" name="contrasena" class="form-control" required>

          </div>



          <button class="btn btn-dark w-100">Entrar</button>



        </form>



        <div class="text-center mt-3">

          <small>¿No tienes cuenta? <a href="#">Regístrate</a></small>

        </div>



      </div>



    </div>

  </div>



</div>
