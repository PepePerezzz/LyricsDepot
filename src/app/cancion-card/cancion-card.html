<div class="card shadow-sm h-100">
  <img [src]="cancion.imagen" [alt]="cancion.titulo" class="card-img-top" style="height:180px; object-fit:cover">
  <div class="card-body d-flex flex-column">
    <h6 class="fw-bold mb-1">{{ cancion.titulo }}</h6>
    <p class="text-muted small mb-2">{{ cancion.artista }}</p>
    <p class="text-muted small mb-auto">{{ cancion.album }} — {{ cancion.anio }}</p>
    <button class="btn btn-outline-warning btn-sm mt-3 w-100" (click)="onAgregarFavorito()">
      ☆ Favorito
    </button>
  </div>
</div>
